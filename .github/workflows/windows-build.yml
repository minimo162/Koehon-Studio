name: Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            native-tts

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build sidecar (release, windows-msvc)
        run: pnpm build:sidecar:release

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: Koehon-Studio-Windows-MSI
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: Koehon-Studio-Windows-NSIS
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload unbundled executable
        uses: actions/upload-artifact@v4
        with:
          name: Koehon-Studio-Windows-Binary
          path: src-tauri/target/release/koehon-studio.exe
          if-no-files-found: warn
