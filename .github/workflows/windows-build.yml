name: Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            native-tts

      - name: Cache Python sidecar bundle
        uses: actions/cache@v4
        with:
          path: src-tauri/python-runtime
          key: python-runtime-windows-${{ runner.os }}-${{ hashFiles('scripts/bundle-python.mjs', 'native-tts-python/requirements.txt', 'native-tts-python/server.py') }}

      - name: Cache Python package downloads
        uses: actions/cache@v4
        with:
          path: |
            .cache/python-bundle
            .cache/pip
          key: python-package-downloads-windows-${{ runner.os }}-${{ hashFiles('scripts/bundle-python.mjs', 'native-tts-python/requirements.txt') }}
          restore-keys: |
            python-package-downloads-windows-${{ runner.os }}-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Build sidecar launcher (release, windows-msvc)
        # Tiny Rust binary that spawns `python-runtime/python/python.exe server.py`
        # at runtime. All TTS work happens in the bundled Python sidecar.
        run: pnpm build:sidecar:release

      - name: Build Python sidecar bundle (python-build-standalone + torch CPU + Irodori + DACVAE)
        # Produces src-tauri/python-runtime/ with:
        #   python/python.exe                       (python-build-standalone 3.11)
        #   python/Lib/site-packages/*              (torch, transformers, irodori_tts, dacvae, ...)
        #   server.py                               (FastAPI sidecar entrypoint)
        # Tauri picks it up as a resource (see tauri.windows.conf.json).
        shell: pwsh
        env:
          PIP_CACHE_DIR: .cache/pip
        run: node scripts/bundle-python.mjs --out src-tauri/python-runtime --reuse-existing --keep-cache

      - name: Report bundle size
        shell: pwsh
        run: |
          $size = (Get-ChildItem -Recurse src-tauri/python-runtime |
                   Measure-Object -Property Length -Sum).Sum
          Write-Host ("python-runtime bundle: {0:N1} MB" -f ($size / 1MB))

      - name: Build Tauri app (NSIS only)
        # --bundles nsis skips MSI. For bundles this large (python-runtime
        # carries torch + transformers + irodori + dacvae), WiX light.exe
        # spends 20-40 min CAB-compressing the resources, and NSIS LZMA
        # produces a smaller installer anyway. Keep MSI build off until
        # someone actually needs an MSI.
        run: pnpm tauri build --bundles nsis

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: Koehon-Studio-Windows-NSIS
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload unbundled executable
        uses: actions/upload-artifact@v4
        with:
          name: Koehon-Studio-Windows-Binary
          path: src-tauri/target/release/koehon-studio.exe
          if-no-files-found: warn
